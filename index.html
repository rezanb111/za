<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تحقیق جامع تکنولوژی و تولید محتوا</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#172033;
      --muted:#667085;
      --gold:#d8a74f;
      --blue:#1d4ed8;
      --cyan:#0ea5e9;
      --bg:#eef3fb;
      --paper:#ffffff;
      --line:#dbe4f0;
      --soft:#f7f9fc;
      --dark:#0f172a;
      --green:#10b981;
      --rose:#e11d48;
    }

    *{
      box-sizing:border-box;
      -webkit-print-color-adjust:exact !important;
      print-color-adjust:exact !important;
    }

    body{
      margin:0;
      background:
        radial-gradient(circle at top right, rgba(14,165,233,.22), transparent 35%),
        radial-gradient(circle at bottom left, rgba(216,167,79,.20), transparent 35%),
        var(--bg);
      color:var(--ink);
      font-family:"Vazirmatn", Tahoma, Arial, sans-serif;
      line-height:1.85;
    }

    .toolbar{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(15,23,42,.92);
      color:white;
      padding:12px 18px;
      display:flex;
      gap:12px;
      justify-content:center;
      align-items:center;
      backdrop-filter:blur(12px);
      box-shadow:0 10px 30px rgba(15,23,42,.25);
    }

    .toolbar button{
      border:0;
      background:linear-gradient(135deg,var(--gold),#f6d365);
      color:#111827;
      padding:10px 18px;
      border-radius:999px;
      font-weight:800;
      cursor:pointer;
      font-family:inherit;
    }

    .toolbar span{
      font-size:13px;
      color:#dbeafe;
    }

    .book{
      padding:24px 0 50px;
    }

    .sheet{
      width:210mm;
      height:297mm;
      margin:0 auto 22px;
      background:var(--paper);
      position:relative;
      overflow:hidden;
      box-shadow:0 22px 55px rgba(15,23,42,.18);
      border:1px solid rgba(15,23,42,.08);
      page-break-after:always;
      break-after:page;
    }

    .sheet::before{
      content:"";
      position:absolute;
      inset:10mm;
      border:1.2px solid rgba(216,167,79,.75);
      border-radius:18px;
      pointer-events:none;
      z-index:5;
    }

    .sheet::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(29,78,216,.06), transparent 32%),
        linear-gradient(315deg, rgba(216,167,79,.08), transparent 38%);
      pointer-events:none;
    }

    .page-inner{
      position:relative;
      z-index:2;
      height:100%;
      padding:18mm 18mm 15mm;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:2px solid var(--line);
      padding-bottom:8px;
      min-height:36px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:5px 12px;
      border-radius:999px;
      background:#eff6ff;
      color:#1e40af;
      font-size:11px;
      font-weight:800;
      border:1px solid #bfdbfe;
      white-space:nowrap;
    }

    .mini{
      font-size:10.5px;
      color:var(--muted);
      font-weight:600;
    }

    h1,h2,h3,p{
      margin:0;
    }

    h1{
      font-size:31px;
      line-height:1.55;
      font-weight:900;
      letter-spacing:-.4px;
      color:#0f172a;
    }

    h2{
      font-size:20px;
      font-weight:900;
      color:#102a54;
      border-right:5px solid var(--gold);
      padding-right:10px;
      line-height:1.6;
    }

    h3{
      font-size:14px;
      font-weight:900;
      color:#1e3a8a;
    }

    .lead{
      font-size:13px;
      color:#344054;
      text-align:justify;
      font-weight:500;
    }

    .text{
      font-size:11.4px;
      text-align:justify;
      color:#1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:12px;
      align-items:stretch;
      flex:1;
      min-height:0;
    }

    .card{
      background:rgba(255,255,255,.88);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      box-shadow:0 12px 26px rgba(15,23,42,.06);
    }

    .visual{
      position:relative;
      min-height:145px;
      border-radius:20px;
      overflow:hidden;
      border:1px solid rgba(15,23,42,.1);
      box-shadow:0 15px 35px rgba(15,23,42,.13);
      background:#111827;
    }

    .visual img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter:saturate(1.08) contrast(1.05);
    }

    .visual .overlay{
      position:absolute;
      inset:auto 0 0 0;
      padding:12px;
      color:white;
      background:linear-gradient(to top,rgba(15,23,42,.88),transparent);
      font-size:11px;
      font-weight:700;
    }

    .quote{
      border-radius:18px;
      padding:13px;
      background:linear-gradient(135deg,#0f172a,#1e3a8a);
      color:white;
      font-size:11.3px;
      text-align:justify;
      box-shadow:0 15px 35px rgba(30,58,138,.25);
    }

    .quote strong{
      color:#fde68a;
    }

    .list{
      display:grid;
      gap:7px;
      margin-top:8px;
    }

    .item{
      display:flex;
      gap:8px;
      align-items:flex-start;
      background:var(--soft);
      border:1px solid #e5eaf2;
      border-radius:13px;
      padding:8px;
      font-size:10.8px;
      color:#344054;
      text-align:justify;
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:99px;
      background:var(--gold);
      margin-top:8px;
      flex:0 0 auto;
      box-shadow:0 0 0 4px rgba(216,167,79,.16);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .stat{
      border-radius:16px;
      padding:9px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      text-align:center;
    }

    .stat b{
      display:block;
      font-size:17px;
      color:#1d4ed8;
      font-weight:900;
      line-height:1.3;
    }

    .stat span{
      font-size:9.7px;
      color:var(--muted);
      font-weight:700;
    }

    .footer{
      margin-top:auto;
      border-top:1px solid var(--line);
      padding-top:7px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#667085;
      font-size:10px;
      font-weight:700;
    }

    .page-no{
      min-width:28px;
      height:28px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--blue),var(--cyan));
      color:white;
      font-size:11px;
      box-shadow:0 8px 20px rgba(29,78,216,.25);
    }

    .cover{
      background:
        linear-gradient(135deg,rgba(15,23,42,.92),rgba(30,58,138,.82)),
        url("https://picsum.photos/seed/content-tech-cover/1600/2200") center/cover;
      color:white;
    }

    .cover::before{
      border-color:rgba(255,255,255,.35);
    }

    .cover .page-inner{
      padding:19mm;
      justify-content:space-between;
    }

    .cover h1{
      color:white;
      font-size:35px;
      text-align:center;
      text-shadow:0 12px 35px rgba(0,0,0,.35);
    }

    .cover-sub{
      text-align:center;
      font-size:16px;
      color:#e0f2fe;
      font-weight:700;
      margin-top:10px;
    }

    .cover-box{
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.28);
      border-radius:26px;
      padding:18px;
      backdrop-filter:blur(12px);
      box-shadow:0 25px 70px rgba(0,0,0,.25);
    }

    .cover-table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 9px;
      margin-top:16px;
      font-size:13px;
    }

    .cover-table td{
      padding:10px 12px;
      background:rgba(255,255,255,.11);
      border-top:1px solid rgba(255,255,255,.2);
      border-bottom:1px solid rgba(255,255,255,.2);
    }

    .cover-table td:first-child{
      border-radius:0 14px 14px 0;
      color:#fde68a;
      font-weight:900;
      width:34%;
    }

    .cover-table td:last-child{
      border-radius:14px 0 0 14px;
      font-weight:700;
    }

    .toc{
      columns:2;
      column-gap:22px;
      font-size:11.4px;
    }

    .toc div{
      break-inside:avoid;
      padding:6px 0;
      border-bottom:1px dashed #cbd5e1;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }

    .refs{
      font-size:10.8px;
      text-align:justify;
    }

    .refs li{
      margin-bottom:7px;
    }

    @media print{
      body{
        background:white;
      }

      .toolbar{
        display:none;
      }

      .book{
        padding:0;
      }

      .sheet{
        margin:0;
        box-shadow:none;
        border:0;
      }

      @page{
        size:A4;
        margin:0;
      }
    }

    @media screen and (max-width:900px){
      .sheet{
        transform:scale(.62);
        transform-origin:top center;
        margin-bottom:-105mm;
      }
      .toolbar{
        flex-direction:column;
      }
    }
  </style>
</head>

          "آینده تولید محتوا تحت تأثیر فناوری‌های هوشمند، واقعیت افزوده، واقعیت مجازی، اینترنت پرسرعت، ابزارهای تحلیلی پیشرفته و پلتفرم‌های تعاملی شکل خواهد گرفت. محتوا بیش از گذشته شخصی‌سازی می‌شود و هر کاربر ممکن است بر اساس نیاز، موقعیت، سابقه رفتاری و علایق خود تجربه‌ای متفاوت دریافت کند.",
          "در این آینده، مهارت انسانی همچنان اهمیت دارد. هرچند ابزارها بخشی از تولید را سریع‌تر می‌کنند، اما انتخاب زاویه نگاه، تشخیص نیاز واقعی، روایت معتبر، مسئولیت اخلاقی و ایجاد اعتماد، به تفکر انسانی وابسته است. بنابراین آینده موفق متعلق به افرادی است که بتوانند فناوری را بشناسند، اما هویت انسانی محتوا را حفظ کنند."
        ],
        points:["شخصی‌سازی تجربه محتوا گسترش خواهد یافت.","قالب‌های چندرسانه‌ای و تعاملی پررنگ‌تر می‌شوند.","اعتماد و اصالت در آینده ارزش بیشتری پیدا می‌کند."]
      },
      {
        title:"جمع‌بندی و نتیجه‌گیری نهایی",
        tag:"نتیجه‌گیری",
        seed:"final-conclusion",
        quote:"تکنولوژی مسیر تولید محتوا را تغییر داده، اما جوهره اصلی محتوا همچنان فهم انسان و انتقال معنادار پیام است.",
        paragraphs:[
          "بررسی‌ها نشان می‌دهد تکنولوژی و تولید محتوا رابطه‌ای جدایی‌ناپذیر دارند. فناوری ابزارهای تازه‌ای برای تولید، ویرایش، انتشار، تحلیل و بهینه‌سازی فراهم کرده و باعث شده محتوا سریع‌تر، گسترده‌تر و دقیق‌تر به مخاطب برسد. با این حال، موفقیت در این حوزه فقط به ابزار وابسته نیست؛ بلکه به شناخت مخاطب، کیفیت پیام، اعتبار منبع، طراحی مناسب، استمرار و اخلاق حرفه‌ای بستگی دارد.",
          "تولید محتوا در دنیای امروز یک فعالیت تخصصی، چندبعدی و راهبردی است. فرد یا سازمانی که می‌خواهد در این میدان موفق باشد، باید هم با تکنولوژی آشنا باشد و هم اصول ارتباط انسانی را درک کند. آینده این حوزه متعلق به کسانی است که بتوانند میان داده و خلاقیت، سرعت و دقت، جذابیت و صداقت، و ابزار و اندیشه تعادل برقرار کنند."
        ],
        points:["محتوای موفق حاصل ترکیب فناوری، خلاقیت و شناخت مخاطب است.","استمرار، کیفیت و سنجش‌پذیری سه پایه اصلی موفقیت هستند.","آینده محتوا به مهارت‌های انسانی و فناورانه هم‌زمان نیاز دارد."]
      },
      {
        title:"منابع و پیشنهادهای تکمیلی",
        tag:"منابع",
        seed:"references-library",
        quote:"پژوهش معتبر با مطالعه پیوسته، مقایسه منابع و نگاه انتقادی کامل می‌شود.",
        paragraphs:[
          "برای تکمیل این تحقیق، مطالعه منابع تخصصی در حوزه رسانه دیجیتال، بازاریابی محتوایی، سئو، تجربه کاربری، تحلیل داده، اخلاق رسانه و فناوری‌های نوین توصیه می‌شود. همچنین بررسی نمونه‌های واقعی از وب‌سایت‌ها، شبکه‌های اجتماعی، کمپین‌های محتوایی و پلتفرم‌های آموزشی می‌تواند درک کاربردی‌تری از موضوع ایجاد کند.",
          "پیشنهاد می‌شود دانشجویان برای توسعه مهارت عملی، یک پروژه محتوایی کوچک طراحی کنند؛ برای نمونه انتخاب یک موضوع، شناخت مخاطب، تدوین تقویم محتوایی، تولید چند قالب مختلف، انتشار آزمایشی و تحلیل نتایج. این تمرین نشان می‌دهد که تولید محتوا فقط دانستن مفاهیم نیست، بلکه نیازمند اجرا، بازبینی و اصلاح مستمر است."
        ],
        points:["مطالعه منابع تخصصی باید با تمرین عملی همراه شود.","تحلیل نمونه‌های واقعی یادگیری را عمیق‌تر می‌کند.","پروژه عملی بهترین راه درک فرایند تولید محتواست."],
        refs:true
      }
    ];

    const book = document.getElementById("book");

    function img(seed){
      return `https://picsum.photos/seed/${encodeURIComponent(seed)}/900/650`;
    }

    function faNumber(n){
      return String(n).replace(/\d/g, d => "۰۱۲۳۴۵۶۷۸۹"[d]);
    }

    function coverPage(){
      const div = document.createElement("section");
      div.className = "sheet cover";
      div.innerHTML = `
        <div class="page-inner">
          <div class="topbar" style="border-color:rgba(255,255,255,.25)">
            <span class="badge" style="background:rgba(255,255,255,.15);color:white;border-color:rgba(255,255,255,.28)">پژوهش دانشگاهی</span>
            <span class="mini" style="color:#e0f2fe">${meta.date}</span>
          </div>

          <div class="cover-box">
            <h1>${meta.title}</h1>
            <div class="cover-sub">بررسی جامع نقش فناوری در ایده‌پردازی، تولید، انتشار، تحلیل و آینده محتوای دیجیتال</div>

            <table class="cover-table">
              <tr>
                <td>نام محققین</td>
                <td>${meta.researchers}</td>
              </tr>
              <tr>
                <td>استاد راهنما</td>
                <td>${meta.advisor}</td>
              </tr>
              <tr>
                <td>دانشگاه</td>
                <td>${meta.university}</td>
              </tr>
              <tr>
                <td>تاریخ</td>
                <td>${meta.date}</td>
              </tr>
            </table>
          </div>

          <div class="quote" style="background:rgba(15,23,42,.58);border:1px solid rgba(255,255,255,.25)">
            این تحقیق با هدف شناخت دقیق پیوند میان تکنولوژی و تولید محتوا تنظیم شده و تلاش دارد تصویری کاربردی، منظم و قابل استفاده از مهم‌ترین مفاهیم، ابزارها، چالش‌ها و فرصت‌های این حوزه ارائه دهد.
          </div>

          <div class="footer" style="border-color:rgba(255,255,255,.25);color:#e5e7eb">
            <span>${meta.university}</span>
            <span class="page-no">۱</span>
          </div>
        </div>
      `;
      return div;
    }

    function tocHtml(){
      return chapters.map((c,i)=>`
        <div>
          <span>${faNumber(i + 1)}. ${c.title}</span>
          <b>${faNumber(i + 2)}</b>
        </div>
      `).join("");
    }

    function referencesHtml(){
      return `
        <ol class="refs">
          <li>راهنماهای رسمی موتورهای جست‌وجو درباره اصول تولید محتوای مفید، ساختار صفحات و تجربه کاربری.</li>
          <li>منابع آموزشی بازاریابی محتوایی درباره قیف جذب مخاطب، تقویم محتوایی و سنجش عملکرد کمپین‌ها.</li>
          <li>مقالات تخصصی تجربه کاربری و نوشتار کاربردی درباره خوانایی، معماری اطلاعات و طراحی مسیر کاربر.</li>
          <li>منابع دانشگاهی حوزه ارتباطات و رسانه درباره تحول رسانه‌های سنتی به رسانه‌های دیجیتال.</li>
          <li>گزارش‌ها و تحلیل‌های منتشرشده درباره شبکه‌های اجتماعی، رفتار کاربران و نقش الگوریتم‌ها در توزیع محتوا.</li>
          <li>منابع حقوقی و آموزشی مرتبط با کپی‌رایت، حریم خصوصی، امنیت اطلاعات و اخلاق حرفه‌ای در فضای دیجیتال.</li>
        </ol>
      `;
    }

    function chapterPage(ch, index){
      const pageNumber = index + 2;
      const div = document.createElement("section");
      div.className = "sheet";

      const statBase = 58 + ((index * 7) % 31);
      const statTwo = 34 + ((index * 5) % 42);
      const statThree = 71 + ((index * 3) % 24);

      div.innerHTML = `
        <div class="page-inner">
          <div class="topbar">
            <span class="badge">${ch.tag}</span>
            <span class="mini">${meta.title}</span>
          </div>

          <h2>${ch.title}</h2>

          <div class="grid">
            <div class="card">
              <p class="lead">${ch.paragraphs[0]}</p>
              <p class="text" style="margin-top:9px">${ch.paragraphs[1]}</p>

              ${ch.toc ? `<div class="card" style="margin-top:10px;background:#fbfdff"><div class="toc">${tocHtml()}</div></div>` : ""}

              ${ch.refs ? `<div class="card" style="margin-top:10px;background:#fbfdff">${referencesHtml()}</div>` : ""}

              <div class="list">
                ${ch.points.map(p=>`
                  <div class="item">
                    <span class="dot"></span>
                    <span>${p}</span>
                  </div>
                `).join("")}
              </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:10px;min-height:0">
              <div class="visual" style="height:178px">
                <img src="${img(ch.seed)}" alt="${ch.title}">
                <div class="overlay">${ch.title}</div>
              </div>

              <div class="quote"><strong>نکته کلیدی:</strong> ${ch.quote}</div>

              <div class="stats">
                <div class="stat">
                  <b>${faNumber(statBase)}٪</b>
                  <span>اثر برنامه‌ریزی</span>
                </div>
                <div class="stat">
                  <b>${faNumber(statTwo)}٪</b>
                  <span>نیاز به تحلیل</span>
                </div>
                <div class="stat">
                  <b>${faNumber(statThree)}٪</b>
                  <span>اهمیت کیفیت</span>
                </div>
              </div>

              <div class="card">
                <h3>کاربرد عملی</h3>
                <p class="text" style="margin-top:5px">
                  برای استفاده عملی از این بخش، لازم است موضوع اصلی مشخص شود، مخاطب هدف تعریف گردد، قالب مناسب انتخاب شود و پس از انتشار، نتیجه با شاخص‌های روشن بررسی شود. این چرخه باعث می‌شود محتوا از حالت اتفاقی خارج شده و به بخشی قابل مدیریت از برنامه ارتباطی تبدیل گردد.
                </p>
              </div>
            </div>
          </div>

          <div class="footer">
            <span>${meta.researchers}</span>
            <span class="page-no">${faNumber(pageNumber)}</span>
            <span>${meta.date}</span>
          </div>
        </div>
      `;
      return div;
    }

    book.appendChild(coverPage());
    chapters.forEach((chapter, index) => {
      book.appendChild(chapterPage(chapter, index));
    });
  </script>
</body>
</html>
