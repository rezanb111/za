<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تحقیق جامع تکنولوژی و تولید محتوا</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --paper:#ffffff;
      --ink:#111827;
      --muted:#64748b;
      --line:#d8e2f0;
      --blue:#1d4ed8;
      --sky:#0ea5e9;
      --cyan:#22d3ee;
      --gold:#d6a13d;
      --gold2:#f5d076;
      --navy:#0f172a;
      --green:#10b981;
      --rose:#e11d48;
      --violet:#7c3aed;
      --soft:#f8fbff;
    }

    *{
      box-sizing:border-box;
      -webkit-print-color-adjust:exact !important;
      print-color-adjust:exact !important;
    }

    body{
      margin:0;
      font-family:"Vazirmatn", Tahoma, Arial, sans-serif;
      line-height:1.85;
      color:var(--ink);
      background:
        radial-gradient(circle at 10% 8%, rgba(34,211,238,.22), transparent 26%),
        radial-gradient(circle at 88% 18%, rgba(245,208,118,.26), transparent 30%),
        radial-gradient(circle at 42% 88%, rgba(124,58,237,.15), transparent 34%),
        #edf3fb;
    }

    .toolbar{
      position:sticky;
      top:0;
      z-index:9999;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:12px 22px;
      color:white;
      background:rgba(15,23,42,.94);
      backdrop-filter:blur(14px);
      box-shadow:0 12px 35px rgba(15,23,42,.25);
    }

    .toolbar-title{
      font-size:14px;
      font-weight:900;
    }

    .toolbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .toolbar button{
      border:0;
      cursor:pointer;
      font-family:inherit;
      font-weight:900;
      border-radius:999px;
      padding:10px 16px;
      color:#111827;
      background:linear-gradient(135deg,var(--gold2),var(--gold));
      box-shadow:0 10px 24px rgba(214,161,61,.30);
    }

    .toolbar button.secondary{
      background:linear-gradient(135deg,#dbeafe,#67e8f9);
    }

    .book{
      padding:26px 0 60px;
    }

    .sheet{
      width:210mm;
      height:297mm;
      margin:0 auto 24px;
      position:relative;
      overflow:hidden;
      background:var(--paper);
      box-shadow:0 26px 70px rgba(15,23,42,.22);
      page-break-after:always;
      break-after:page;
    }

    .sheet::before{
      content:"";
      position:absolute;
      inset:9mm;
      z-index:4;
      pointer-events:none;
      border-radius:24px;
      border:1.6px solid rgba(214,161,61,.90);
      background:
        linear-gradient(90deg, rgba(214,161,61,.95) 0 54px, transparent 54px calc(100% - 54px), rgba(214,161,61,.95) calc(100% - 54px)) top/100% 2px no-repeat,
        linear-gradient(90deg, rgba(214,161,61,.95) 0 54px, transparent 54px calc(100% - 54px), rgba(214,161,61,.95) calc(100% - 54px)) bottom/100% 2px no-repeat,
        linear-gradient(0deg, rgba(29,78,216,.78) 0 54px, transparent 54px calc(100% - 54px), rgba(29,78,216,.78) calc(100% - 54px)) right/2px 100% no-repeat,
        linear-gradient(0deg, rgba(29,78,216,.78) 0 54px, transparent 54px calc(100% - 54px), rgba(29,78,216,.78) calc(100% - 54px)) left/2px 100% no-repeat;
    }

    .sheet::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
      background:
        radial-gradient(circle at 7% 8%, rgba(34,211,238,.13), transparent 18%),
        radial-gradient(circle at 94% 90%, rgba(214,161,61,.14), transparent 22%),
        linear-gradient(135deg, rgba(29,78,216,.052), transparent 38%),
        linear-gradient(315deg, rgba(124,58,237,.045), transparent 42%);
    }

    .corner{
      position:absolute;
      width:31mm;
      height:31mm;
      z-index:5;
      pointer-events:none;
      opacity:.95;
    }

    .corner::before,
    .corner::after{
      content:"";
      position:absolute;
      border-radius:999px;
      border:1.5px solid rgba(214,161,61,.86);
    }

    .corner::before{inset:4mm}
    .corner::after{inset:9mm;border-color:rgba(29,78,216,.52)}
    .tr{top:5.5mm;right:5.5mm}
    .tl{top:5.5mm;left:5.5mm}
    .br{bottom:5.5mm;right:5.5mm}
    .bl{bottom:5.5mm;left:5.5mm}

    .page-inner{
      position:relative;
      z-index:10;
      height:100%;
      padding:17mm 17mm 13.5mm;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      min-height:34px;
      padding-bottom:7px;
      border-bottom:1.6px solid var(--line);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:5px 12px;
      border-radius:999px;
      font-size:10px;
      font-weight:900;
      color:#1e3a8a;
      background:linear-gradient(135deg,#eff6ff,#e0f2fe);
      border:1px solid #bfdbfe;
      white-space:nowrap;
    }

    .mini{
      color:var(--muted);
      font-size:9.7px;
      font-weight:800;
    }

    h1,h2,h3,p{
      margin:0;
    }

    h1{
      color:#0f172a;
      font-size:32px;
      line-height:1.55;
      font-weight:900;
      letter-spacing:-.4px;
    }

    h2{
      color:#102a54;
      font-size:18px;
      line-height:1.55;
      font-weight:900;
      padding-right:12px;
      border-right:6px solid var(--gold);
    }

    h3{
      color:#1d4ed8;
      font-size:12px;
      font-weight:900;
    }

    .lead{
      font-size:11.25px;
      line-height:1.9;
      color:#334155;
      text-align:justify;
      font-weight:500;
    }

    .text{
      font-size:9.85px;
      line-height:1.88;
      color:#243044;
      text-align:justify;
    }

    .content-grid{
      display:grid;
      grid-template-columns:1.08fr .92fr;
      gap:10px;
      min-height:0;
    }

    .card{
      border:1px solid var(--line);
      border-radius:19px;
      background:rgba(255,255,255,.92);
      padding:10px;
      box-shadow:0 13px 30px rgba(15,23,42,.07);
    }

    .visual{
      position:relative;
      height:144px;
      overflow:hidden;
      border-radius:22px;
      background:#0f172a;
      border:1px solid rgba(15,23,42,.10);
      box-shadow:0 18px 38px rgba(15,23,42,.18);
    }

    .visual.large{
      height:195px;
    }

    .visual img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      filter:saturate(1.12) contrast(1.05);
    }

    .visual-caption{
      position:absolute;
      inset:auto 0 0;
      padding:13px 12px 9px;
      color:white;
      font-size:9.5px;
      font-weight:900;
      background:linear-gradient(to top,rgba(15,23,42,.92),rgba(15,23,42,.02));
    }

    .quote{
      padding:11px;
      border-radius:19px;
      color:white;
      background:
        linear-gradient(135deg,rgba(15,23,42,.96),rgba(30,58,138,.92)),
        radial-gradient(circle at 20% 18%, rgba(34,211,238,.34), transparent 30%);
      box-shadow:0 16px 34px rgba(30,58,138,.24);
      font-size:9.9px;
      line-height:1.8;
      text-align:justify;
    }

    .quote b{
      color:#fde68a;
    }

    .info-list{
      display:grid;
      gap:6px;
    }

    .info-item{
      display:flex;
      gap:7px;
      align-items:flex-start;
      padding:7px;
      border-radius:14px;
      background:linear-gradient(135deg,#f8fafc,#ffffff);
      border:1px solid #e2e8f0;
      color:#334155;
      font-size:9.35px;
      line-height:1.75;
      text-align:justify;
    }

    .dot{
      width:8px;
      height:8px;
      margin-top:7px;
      flex:0 0 auto;
      border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 0 4px rgba(214,161,61,.17);
    }

    .bottom-band{
      margin-top:auto;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }

    .bottom-card{
      min-height:88px;
      padding:8px;
      border-radius:17px;
      border:1px solid #dbeafe;
      background:linear-gradient(135deg,rgba(239,246,255,.96),rgba(255,255,255,.92));
      box-shadow:0 11px 24px rgba(15,23,42,.06);
    }

    .bottom-card:nth-child(2){
      border-color:#dcfce7;
      background:linear-gradient(135deg,rgba(240,253,244,.96),rgba(255,255,255,.92));
    }

    .bottom-card:nth-child(3){
      border-color:#fef3c7;
      background:linear-gradient(135deg,rgba(255,251,235,.96),rgba(255,255,255,.92));
    }

    .bottom-card h3{
      margin-bottom:3px;
      font-size:10.3px;
    }

    .bottom-card p{
      color:#334155;
      font-size:8.7px;
      line-height:1.7;
      text-align:justify;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:7px;
    }

    .stat{
      padding:7px 5px;
      text-align:center;
      border-radius:15px;
      border:1px solid #e2e8f0;
      background:#f8fafc;
    }

    .stat b{
      display:block;
      color:#1d4ed8;
      font-size:14px;
      line-height:1.2;
      font-weight:900;
    }

    .stat span{
      color:#64748b;
      font-size:8.3px;
      font-weight:800;
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding-top:6px;
      border-top:1px solid var(--line);
      color:#64748b;
      font-size:8.8px;
      font-weight:800;
    }

    .page-no{
      width:26px;
      height:26px;
      display:grid;
      place-items:center;
      border-radius:50%;
      color:white;
      font-size:10px;
      background:linear-gradient(135deg,var(--blue),var(--cyan));
      box-shadow:0 10px 22px rgba(29,78,216,.24);
    }

    .cover{
      color:white;
      background:
        linear-gradient(135deg,rgba(6,12,28,.96),rgba(17,45,100,.84)),
        url("https://picsum.photos/seed/professional-content-technology-cover/1800/2600") center/cover no-repeat;
    }

    .cover::before{
      border-color:rgba(255,255,255,.38);
      background:
        linear-gradient(90deg, rgba(255,255,255,.72) 0 62px, transparent 62px calc(100% - 62px), rgba(255,255,255,.72) calc(100% - 62px)) top/100% 2px no-repeat,
        linear-gradient(90deg, rgba(255,255,255,.72) 0 62px, transparent 62px calc(100% - 62px), rgba(255,255,255,.72) calc(100% - 62px)) bottom/100% 2px no-repeat,
        linear-gradient(0deg, rgba(245,208,118,.72) 0 62px, transparent 62px calc(100% - 62px), rgba(245,208,118,.72) calc(100% - 62px)) right/2px 100% no-repeat,
        linear-gradient(0deg, rgba(245,208,118,.72) 0 62px, transparent 62px calc(100% - 62px), rgba(245,208,118,.72) calc(100% - 62px)) left/2px 100% no-repeat;
    }

    .cover .page-inner{
      padding:19mm;
      justify-content:space-between;
    }

    .cover-kicker{
      display:inline-flex;
      align-self:center;
      padding:8px 18px;
      border-radius:999px;
      color:#fde68a;
      font-size:13px;
      font-weight:900;
      border:1px solid rgba(255,255,255,.25);
      background:rgba(255,255,255,.10);
      backdrop-filter:blur(10px);
    }

    .cover-title-box{
      padding:24px 22px;
      border-radius:30px;
      text-align:center;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.25);
      backdrop-filter:blur(14px);
      box-shadow:0 28px 80px rgba(0,0,0,.32);
    }

    .cover h1{
      color:white;
      font-size:36px;
      line-height:1.55;
      text-shadow:0 14px 32px rgba(0,0,0,.35);
    }

    .cover-sub{
      margin-top:12px;
      color:#dbeafe;
      font-size:15px;
      line-height:1.8;
      font-weight:800;
    }

    .cover-table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 9px;
      font-size:12.4px;
    }

    .cover-table td{
      padding:10px 12px;
      border-top:1px solid rgba(255,255,255,.21);
      border-bottom:1px solid rgba(255,255,255,.21);
      background:rgba(255,255,255,.11);
    }

    .cover-table td:first-child{
      width:35%;
      color:#fde68a;
      font-weight:900;
      border-radius:0 15px 15px 0;
    }

    .cover-table td:last-child{
      color:white;
      font-weight:800;
      border-radius:15px 0 0 15px;
    }

    .cover-note{
      color:#e0f2fe;
      font-size:10.7px;
      line-height:1.9;
      text-align:center;
      font-weight:600;
    }

    .toc-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px 15px;
    }

    .toc-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:7px 9px;
      border-radius:14px;
      background:linear-gradient(135deg,#f8fafc,#ffffff);
      border:1px dashed #cbd5e1;
      font-size:10px;
      font-weight:800;
      color:#334155;
    }

    .toc-num{
      min-width:25px;
      height:25px;
      display:grid;
      place-items:center;
      border-radius:50%;
      color:white;
      background:linear-gradient(135deg,var(--blue),var(--cyan));
      font-size:9px;
      font-weight:900;
    }

    .refs{
      font-size:9.7px;
      line-height:1.9;
      text-align:justify;
      color:#253247;
    }

    .refs li{
      margin-bottom:6px;
    }

    .download-page .big-button{
      margin:auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      min-height:210px;
      border-radius:30px;
      color:white;
      text-align:center;
      background:
        linear-gradient(135deg,rgba(15,23,42,.96),rgba(29,78,216,.88)),
        radial-gradient(circle at 20% 25%, rgba(34,211,238,.34), transparent 30%);
      box-shadow:0 22px 55px rgba(29,78,216,.25);
      padding:24px;
    }

    .download-page .big-button button{
      border:0;
      cursor:pointer;
      font-family:inherit;
      font-size:14px;
      font-weight:900;
      padding:13px 24px;
      border-radius:999px;
      color:#111827;
      background:linear-gradient(135deg,var(--gold2),var(--gold));
      box-shadow:0 12px 28px rgba(214,161,61,.30);
    }

    .download-page .big-button p{
      max-width:560px;
      color:#dbeafe;
      font-size:11px;
      line-height:1.9;
      text-align:center;
      font-weight:600;
    }

    @media print{
      body{background:white}
      .toolbar{display:none}
      .book{padding:0}
      .sheet{
        margin:0;
        box-shadow:none;
      }
      @page{
        size:A4;
        margin:0;
      }
    }

    @media screen and (max-width:900px){
      .toolbar{
        flex-direction:column;
        align-items:stretch;
      }

      .toolbar-actions{
        justify-content:center;
      }

      .sheet{
        transform:scale(.58);
        transform-origin:top center;
        margin-bottom:-122mm;
      }
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <div class="toolbar-title">تحقیق جامع تکنولوژی و تولید محتوا</div>
    <div class="toolbar-actions">
      <button type="button" onclick="window.print()">چاپ</button>
      <button type="button" class="secondary" onclick="downloadPDF()">دانلود PDF مرتب</button>
    </div>
  </div>

  <main class="book" id="book"></main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    const meta = {
      title: "تحقیق جامع درباره تکنولوژی و تولید محتوا",
      subtitle: "بررسی نقش فناوری‌های نوین در طراحی، تولید، انتشار، تحلیل و توسعه محتوای دیجیتال",
      researchers: "زکیه مهدوی و نادیا باقری حیدری",
      advisor: "غلام‌پور",
      university: "دانشگاه علمی کاربردی، واحد نجف‌آباد",
      date: "۱۹ اردیبهشت ۱۴۰۵"
    };

    const chapters = [
      {
        title:"مقدمه و طرح مسئله",
        tag:"Introduction",
        seed:"digital-content-introduction",
        quote:"تولید محتوا در جهان امروز فقط نوشتن چند جمله یا انتشار یک تصویر نیست؛ این فرایند ترکیبی از شناخت انسان، فناوری، رسانه، تحلیل داده و طراحی تجربه است.",
        paragraphs:[
          "در دهه‌های گذشته، تولید محتوا بیشتر به فعالیت‌هایی مانند نگارش متن، چاپ بروشور، تهیه گزارش، ساخت برنامه‌های رادیویی و تلویزیونی یا انتشار مطالب در رسانه‌های سنتی محدود بود. اما با گسترش اینترنت، تلفن‌های هوشمند، شبکه‌های اجتماعی، پلتفرم‌های ویدئویی، ابزارهای طراحی و سامانه‌های مدیریت محتوا، مفهوم محتوا به شکل عمیقی تغییر کرد. امروز محتوا می‌تواند متن، تصویر، ویدئو، پادکست، اینفوگرافیک، تجربه تعاملی، دوره آموزشی، خبرنامه، صفحه فرود، پست شبکه اجتماعی، گزارش داده‌محور یا حتی یک بازی آموزشی باشد.",
          "اهمیت این موضوع زمانی بیشتر می‌شود که بدانیم بسیاری از تصمیم‌های روزمره افراد، از خرید کالا و انتخاب خدمات تا یادگیری، سرگرمی، مشارکت اجتماعی و حتی شکل‌گیری دیدگاه‌ها، تحت تأثیر محتوایی است که در فضای دیجیتال دریافت می‌کنند. به همین دلیل تولید محتوا به یک فعالیت ساده و حاشیه‌ای محدود نمی‌شود، بلکه به یکی از پایه‌های اصلی ارتباطات، آموزش، بازاریابی، رسانه، فرهنگ و اقتصاد دیجیتال تبدیل شده است.",
          "تکنولوژی در این میان نقش شتاب‌دهنده دارد. ابزارهای جدید باعث شده‌اند ایده‌ها سریع‌تر به محتوا تبدیل شوند، محتوا با کیفیت بالاتری منتشر شود، رفتار مخاطبان بهتر تحلیل گردد و فرایند اصلاح و توسعه محتوا دقیق‌تر انجام شود. با این حال، ابزار به‌تنهایی کیفیت ایجاد نمی‌کند. محتوای موفق نیازمند پژوهش، استراتژی، اصالت، زیبایی بصری، لحن مناسب، اخلاق حرفه‌ای و درک درست از مخاطب است."
        ],
        points:["تولید محتوا یک فرایند چندرشته‌ای است.","تکنولوژی سرعت، کیفیت و دامنه انتشار محتوا را افزایش داده است.","محتوای ارزشمند بر پایه شناخت مخاطب، هدف روشن و پیام معتبر شکل می‌گیرد."],
        practical:"در آغاز هر پروژه محتوایی باید مسئله اصلی، هدف انتشار، مخاطب هدف، کانال ارائه و شاخص ارزیابی مشخص شود. بدون این نقشه اولیه، حتی محتوای زیبا نیز ممکن است نتیجه دقیق نداشته باشد.",
        checklist:"تعریف هدف، شناخت مخاطب، انتخاب قالب، تعیین زمان‌بندی انتشار و طراحی معیار سنجش، پنج گام ضروری شروع کار هستند.",
        key:"مقدمه تحقیق نشان می‌دهد که محتوا، نقطه اتصال تکنولوژی و ارتباط انسانی است."
      },
      {
        title:"مفهوم تکنولوژی در عصر دیجیتال",

        ...chapters.map((c,i)=>({title:c.title,page:i+4})),
        {title:"منابع و مآخذ",page:29},
        {title:"صفحه پایانی و دریافت PDF",page:30}
      ];
      const half = Math.ceil(all.length / 2);
      const items = part === 1 ? all.slice(0, half) : all.slice(half);

      return shell(`
        <div class="topbar">
          <span class="badge">فهرست مطالب | بخش ${part}</span>
          <span class="mini">${meta.researchers}</span>
        </div>

        <h2>فهرست ${part === 1 ? "بخش نخست" : "بخش دوم"}</h2>

        <p class="lead">
          برای خوانایی بهتر و جلوگیری از شلوغی نامنظم، فهرست مطالب در دو صفحه تنظیم شده است. شماره‌های مقابل هر عنوان، جایگاه تقریبی هر بخش در نسخه A4 را نشان می‌دهد.
        </p>

        <div class="toc-grid">
          ${items.map(item=>`
            <div class="toc-item">
              <span>${item.title}</span>
              <span class="toc-num">${item.page}</span>
            </div>
          `).join("")}
        </div>

        <div class="bottom-band">
          <div class="bottom-card">
            <h3>راهنمای مطالعه</h3>
            <p>پیشنهاد می‌شود ابتدا مقدمه، سپس بخش‌های استراتژی، مخاطب، طراحی، سئو و کاربردهای عملی مطالعه شوند.</p>
          </div>
          <div class="bottom-card">
            <h3>ساختار تحقیق</h3>
            <p>مطالب از مبانی نظری شروع شده و به کاربردهای عملی، چالش‌ها، آینده و جمع‌بندی نهایی می‌رسد.</p>
          </div>
          <div class="bottom-card">
            <h3>هدف فهرست</h3>
            <p>فهرست دوصفحه‌ای برای نظم بیشتر، خوانایی بهتر و جلوگیری از فشردگی نامناسب طراحی شده است.</p>
          </div>
        </div>
      `,page);
    }

    function chapterPage(chapter, index){
      const page = index + 4;
      return shell(`
        <div class="topbar">
          <span class="badge">${chapter.tag}</span>
          <span class="mini">${meta.researchers} | صفحه ${page}</span>
        </div>

        <h2>${chapter.title}</h2>

        <div class="content-grid">
          <div class="card">
            <p class="lead">${chapter.paragraphs[0]}</p>
            <p class="text">${chapter.paragraphs[1]}</p>
            <p class="text">${chapter.paragraphs[2]}</p>
          </div>

          <div style="display:grid;gap:10px;">
            <div class="visual">
              <img src="${img(chapter.seed)}" alt="${chapter.title}">
              <div class="visual-caption">${chapter.title}</div>
            </div>

            <div class="quote">
              <b>نگاه کلیدی:</b>
              ${chapter.quote}
            </div>
          </div>
        </div>

        <div class="content-grid">
          <div class="card">
            <h3>تحلیل تکمیلی</h3>
            <p class="text">
              این بخش نشان می‌دهد که موضوع فقط یک بحث نظری نیست، بلکه در برنامه‌ریزی روزانه، آموزش، رسانه، کسب‌وکار، ارتباطات سازمانی و حتی مهارت‌های فردی کاربرد مستقیم دارد. تولید محتوای موفق زمانی شکل می‌گیرد که میان هدف، مخاطب، ابزار، پیام، زیبایی بصری و ارزیابی نتیجه هماهنگی وجود داشته باشد. هرچه این هماهنگی دقیق‌تر باشد، محتوا اثرگذارتر، ماندگارتر و قابل اعتمادتر خواهد بود.
            </p>
            <p class="text">
              در عمل، تولیدکننده محتوا باید هم نگاه خلاقانه داشته باشد و هم نگاه تحلیلی. خلاقیت باعث شکل‌گیری ایده‌های تازه می‌شود، اما تحلیل کمک می‌کند تصمیم‌ها بر اساس شواهد و نتیجه واقعی گرفته شوند. بنابراین ترکیب هنر، دانش، فناوری و اخلاق حرفه‌ای، پایه اصلی تولید محتوای ارزشمند است.
            </p>
          </div>

          <div class="card">
            <h3>نکات اصلی این بخش</h3>
            <div class="info-list">
              ${chapter.points.map(point=>`
                <div class="info-item">
                  <span class="dot"></span>
                  <span>${point}</span>
                </div>
              `).join("")}
            </div>

            <div class="stats" style="margin-top:8px;">
              <div class="stat">
                <b>۱</b>
                <span>هدف روشن</span>
              </div>
              <div class="stat">
                <b>۲</b>
                <span>مخاطب دقیق</span>
              </div>
              <div class="stat">
                <b>۳</b>
                <span>تحلیل نتیجه</span>
              </div>
            </div>
          </div>
        </div>

        <div class="bottom-band">
          <div class="bottom-card">
            <h3>کاربرد عملی</h3>
            <p>${chapter.practical}</p>
          </div>
          <div class="bottom-card">
            <h3>چک‌لیست اجرایی</h3>
            <p>${chapter.checklist}</p>
          </div>
          <div class="bottom-card">
            <h3>جمع‌بندی کوتاه</h3>
            <p>${chapter.key}</p>
          </div>
        </div>
      `,page);
    }

    function referencesPage(){
      return shell(`
        <div class="topbar">
          <span class="badge">References</span>
          <span class="mini">منابع و مآخذ | صفحه ۲۹</span>
        </div>

        <h2>منابع و مآخذ</h2>

        <p class="lead">
          منابع زیر به‌عنوان پشتوانه مفهومی و مطالعاتی تحقیق مورد توجه قرار گرفته‌اند. در موضوع تکنولوژی و تولید محتوا، استفاده از منابع متنوع اهمیت زیادی دارد؛ زیرا این حوزه هم‌زمان با دانش ارتباطات، بازاریابی، رسانه، آموزش، طراحی تجربه کاربر، تحلیل داده و اخلاق دیجیتال ارتباط دارد.
        </p>

        <div class="content-grid">
          <div class="card">
            <h3>فهرست منابع</h3>
            <ol class="refs">
              ${references.map(ref=>`<li>${ref}</li>`).join("")}
            </ol>
          </div>

          <div style="display:grid;gap:10px;">
            <div class="visual large">
              <img src="${img("research-library-digital-sources")}" alt="منابع تحقیق">
              <div class="visual-caption">اعتبار محتوا از پژوهش، منبع معتبر و تحلیل دقیق آغاز می‌شود.</div>
            </div>

            <div class="quote">
              <b>یادداشت پژوهشی:</b>
              در پژوهش‌های مرتبط با فضای دیجیتال، تاریخ انتشار منابع اهمیت زیادی دارد؛ زیرا ابزارها، رفتار کاربران، الگوریتم‌ها و پلتفرم‌ها به‌سرعت تغییر می‌کنند.
            </div>
          </div>
        </div>

        <div class="content-grid">
          <div class="card">
            <h3>روش استفاده از منابع</h3>
            <p class="text">
              در تدوین یک تحقیق جامع، منابع نباید صرفاً برای پر کردن بخش پایانی استفاده شوند. منبع معتبر باید به فهم بهتر موضوع، مقایسه دیدگاه‌ها، جلوگیری از خطای اطلاعاتی و تقویت استدلال کمک کند. در حوزه تولید محتوا، منابع دانشگاهی دیدگاه نظری می‌دهند، گزارش‌های تخصصی روندهای بازار را نشان می‌دهند و تجربه‌های عملی، کاربرد واقعی مفاهیم را روشن می‌کنند.
            </p>
          </div>

          <div class="card">
            <h3>استاندارد اعتبارسنجی</h3>
            <div class="info-list">
              <div class="info-item"><span class="dot"></span><span>بررسی نویسنده، ناشر، تاریخ انتشار و هدف منبع.</span></div>
              <div class="info-item"><span class="dot"></span><span>مقایسه داده‌ها با چند منبع مستقل و معتبر.</span></div>
              <div class="info-item"><span class="dot"></span><span>پرهیز از استفاده از مطالب بدون زمینه، بدون تاریخ یا بدون پشتوانه روشن.</span></div>
            </div>
          </div>
        </div>

        <div class="bottom-band">
          <div class="bottom-card">
            <h3>منبع معتبر</h3>
            <p>منبع معتبر باید قابل پیگیری، دارای نویسنده یا نهاد مشخص و دارای شواهد کافی باشد.</p>
          </div>
          <div class="bottom-card">
            <h3>پژوهش کاربردی</h3>
            <p>هدف پژوهش فقط گردآوری نیست؛ بلکه باید فهم دقیق‌تر و تصمیم بهتر ایجاد کند.</p>
          </div>
          <div class="bottom-card">
            <h3>به‌روزرسانی</h3>
            <p>در موضوعات دیجیتال، بازبینی و به‌روزرسانی منابع اهمیت ویژه دارد.</p>
          </div>
        </div>
      `,29);
    }

    function finalPage(){
      return shell(`
        <div class="topbar">
          <span class="badge">Final Page</span>
          <span class="mini">صفحه پایانی | دریافت نسخه PDF</span>
        </div>

        <h2>صفحه پایانی</h2>

        <div class="visual large">
          <img src="${img("elegant-final-page-technology-content")}" alt="صفحه پایانی">
          <div class="visual-caption">پایان تحقیق؛ آغاز نگاه حرفه‌ای‌تر به تکنولوژی و تولید محتوا</div>
        </div>

        <div class="card">
          <p class="lead">
            این تحقیق با هدف ارائه تصویری جامع از نقش تکنولوژی در تولید محتوا تنظیم شد. در طول صفحات، از مبانی نظری تا کاربردهای عملی، از طراحی و نگارش تا تحلیل داده، از آموزش و کسب‌وکار تا اخلاق حرفه‌ای و آینده محتوا بررسی شد. نتیجه اصلی آن است که فناوری، مسیر تولید و انتشار محتوا را بسیار گسترده‌تر و سریع‌تر کرده، اما کیفیت واقعی همچنان به تفکر، شناخت مخاطب، پژوهش، زیبایی‌شناسی، صداقت و مسئولیت انسانی وابسته است.
          </p>
          <p class="text">
            محتوای موفق محتوایی است که فقط دیده نشود، بلکه فهمیده شود، اعتماد ایجاد کند، مسئله‌ای را حل نماید و اثری ماندگار بر مخاطب بگذارد. تکنولوژی می‌تواند ابزار این مسیر باشد، اما جهت حرکت را انسان تعیین می‌کند.
          </p>
        </div>

        <div class="download-page">
          <div class="big-button">
            <h1 style="color:white;font-size:25px;">دریافت نسخه PDF تحقیق</h1>
            <p>
              با کلیک روی دکمه زیر، کل صفحات تحقیق با همان صفحه‌بندی A4، کادرها، تصاویر، فهرست، منابع و صفحه پایانی به‌صورت PDF آماده دانلود می‌شود. اگر مرورگر شما اجازه دانلود مستقیم نداد، از گزینه چاپ و ذخیره به‌صورت PDF استفاده کنید.
            </p>
            <button type="button" onclick="downloadPDF()">دانلود PDF مرتب</button>
          </div>
        </div>

        <div class="bottom-band">
          <div class="bottom-card">
            <h3>مشخصات تحقیق</h3>
            <p>موضوع: تکنولوژی و تولید محتوا | قالب: ۳۰ صفحه A4 | طراحی شده برای ارائه و چاپ.</p>
          </div>
          <div class="bottom-card">
            <h3>محققین</h3>
            <p>${meta.researchers} | استاد راهنما: ${meta.advisor}</p>
          </div>
          <div class="bottom-card">
            <h3>دانشگاه</h3>
            <p>${meta.university} | تاریخ: ${meta.date}</p>
          </div>
        </div>
      `,30);
    }

    function render(){
      const book = document.getElementById("book");
      book.innerHTML = [
        coverPage(),
        tocPage(1,2),
        tocPage(2,3),
        ...chapters.map((chapter,index)=>chapterPage(chapter,index)),
        referencesPage(),
        finalPage()
      ].join("");
    }

    function downloadPDF(){
      const element = document.getElementById("book");

      const opt = {
        margin:0,
        filename:"تحقیق-جامع-تکنولوژی-و-تولید-محتوا.pdf",
        image:{
          type:"jpeg",
          quality:0.98
        },
        html2canvas:{
          scale:2,
          useCORS:true,
          allowTaint:true,
          backgroundColor:"#ffffff",
          scrollY:0
        },
        jsPDF:{
          unit:"mm",
          format:"a4",
          orientation:"portrait"
        },
        pagebreak:{
          mode:["css","legacy"],
          before:".sheet"
        }
      };

      html2pdf().set(opt).from(element).save();
    }

    render();
  </script>
</body>
</html>
